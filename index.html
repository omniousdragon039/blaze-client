<!DOCTYPE html>
<html lang="en">
<head>

      margin: 15px;
      cursor: pointer;

      border-radius: 8px;
    }

    .section {

    }

    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
